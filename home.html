<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pricing Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main>
        <div class="wrapper">
            <div class="controls">
                <div>
                    <label>Coil Cost: <input type="range" id="coil-cost" min="0" max="1000" value="100">
                        <span id="coil-cost-display">$1.00</span>
                    </label>
                </div>

                <div>
                    <label>Coil Price: <input type="range" id="coil-price" min="0" max="1000" value="100">
                        <span id="coil-price-display">$1.00</span>
                    </label>
                </div>


                <div>
                    <label>
                        Markup:
                        <input type="range" id="markup" min="0" max="300" value="50">
                        <span id="markup-display">0%</span>
                    </label>

                    <label>
                        <input type="checkbox" id="markup-enabled" checked>
                        On
                    </label>
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
