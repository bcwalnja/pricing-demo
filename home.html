<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pricing Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main>
        <div class="wrapper">
            <div class="controls border">
                <div class="slider">
                    <label for="coil-cost">
                        Coil Cost:
                        <span id="coil-cost-display">$1.00</span>
                    </label>
                    <input type="range" id="coil-cost" min="0" max="1000" value="100">
                </div>

                <div class="slider">
                    <label for="coil-price">
                        Coil Price:
                        <span id="coil-price-display">$1.00</span>
                    </label>
                    <input type="range" id="coil-price" min="0" max="1000" value="100">
                </div>

                <div class="slider">
                    <label for="markup">
                        <input type="checkbox" id="markup-enabled" checked>
                        Markup:
                        <span id="markup-display">0%</span>
                    </label>
                    <input type="range" id="markup" min="0" max="300" value="50">

                </div>

                <img src="./coil.png" />

            </div>

            <div class="components border">
                <img src="./hem.png" />
            </div>

            <div class="special-trim border">

                <div class="special-trim-display">

                    <div class="slider">
                        <label for="special-trim-length">
                            Trim Length:
                            <span id="special-trim-length-display">1' 1"</span>
                        </label>
                        <input type="range" id="special-trim-length" min="0" max="1000" value="100">
                    </div>

                    <div class="slider">
                        <label for="special-trim-stretchout">
                            Stretchout:
                            <span id="special-trim-stretchout-display">1' 1"</span>
                        </label>
                        <input type="range" id="stretchout" min="0" max="1000" value="1000">
                    </div>

                    <svg viewBox="0 0 28 40" width="100">
                        <path id="top-trim" stroke="white" fill="none" />
                        <path id="bottom" stroke="white" fill="none" />
                    </svg>

                </div>

                <div class="special-trim-lf-cost">
                    Linear Foot Cost: 
                    <div>
                        Hems: 
                        <span id="special-trim-length-display">$0.00</span>
                    </div>
                    <div>
                        Bends: 
                        <span id="special-trim-length-display">$0.00</span>
                    </div>
                    <div>
                        Stretchout: 
                        <span id="special-trim-length-display">$0.00</span>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <script src="controls.js"></script>
    <script src="components.js"></script>
    <script src="specialTrim.js"></script>
</body>

</html>
