<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pricing Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main>
        <div class="wrapper">
            <div class="controls border">
                <div class="slider">
                    <label for="coil-cost">
                        Coil Cost: 
                        <span id="coil-cost-display">$1.00</span>
                    </label>
                    <input type="range" id="coil-cost" min="0" max="1000" value="100">
                </div>

                <div class="slider">
                    <label for="coil-price">
                        Coil Price: 
                        <span id="coil-price-display">$1.00</span>
                    </label>
                    <input type="range" id="coil-price" min="0" max="1000" value="100">
                </div>

                <div class="slider">
                    <label for="markup">
                        <input type="checkbox" id="markup-enabled" checked>
                        Markup:
                        <span id="markup-display">0%</span>
                    </label>
                    <input type="range" id="markup" min="0" max="300" value="50">

                </div>
            </div>

            <div class="components border">
                <img src="./coil.png" />
                <img src="./hem.png" />
            </div>

            <div class="special-trim border">
                <svg viewBox="0 0 28 40" width="100">
                    <path d="M28 20 L28 40 L14 40 L14 30 L16 30 L16 34" fill="none" stroke="white" stroke-width="1" />
                    <path d="M14 0 L14 20 L0 20 L0 10 L2 10 L2 14" fill="none" stroke="white" stroke-width="1" />

                    <path d="M28 20 L14 0"  stroke="white"/>
                    <path d="M28 40 L14 20" stroke="white"/>
                    <path d="M14 40 L0 20"  stroke="white"/>
                    <path d="M14 30 L0 10"  stroke="white"/>
                    <path d="M16 30 L2 10"  stroke="white"/>
                    <path d="M16 34 L2 14"  stroke="white"/>

                </svg>

                <div class="slider">
                    <label for="special-trim-length">
                        Trim Length: 
                        <span id="special-trim-length-display">1' 1"</span>
                    </label>
                    <input type="range" id="special-trim-length" min="0" max="1000" value="100">
                </div>

            </div>
        </div>

    </main>

    <script src="controls.js"></script>
    <script src="components.js"></script>
    <script src="specialTrim.js"></script>
</body>

</html>
